## Local robot.yaml overrides default Gopherbot conf/robot.yaml settings.

## "BIG HAMMER" security - if IgnoreUnlistedUsers is set, your robot drops all
## messages unless the connector validated the canonical username for that
## transport user and that username appears in UserRoster.
IgnoreUnlistedUsers: true

## Improved security for secrets - if SecureParameters is true, jobs, plugins,
## and tasks must use GetParameter(secret_name) instead of environment variables.
SecureParameters: true

{{ $environment := env "GOPHER_ENVIRONMENT" | default "production" }}
## Environment-specific runtime defaults (protocol/brain/log destination).
{{ printf "environments/%s.yaml" $environment | .Include }}

{{ $botname := "<botname>" }}
{{ $botemail := "<botemail>" }}
{{ $botfullname := "<botfullname>" }}
{{ $botalias := "<botalias>" }}

BotInfo:
  UserName: {{ $botname }}
  Email: {{ $botemail }}
  FullName: {{ $botfullname }}
  FirstName: {{ $botname }}
  LastName: Gopherbot

Alias: '{{ $botalias }}'

# Defaults for history and workspace directories, relative to the
# process working directory.
{{ $workdir := "workspace" }}
{{ if $workdir -}} WorkSpace: {{ $workdir }} {{- end }}

## Configure a history provider
{{ $history := "file" }}
HistoryProvider: {{ $history }}

## Outgoing format when a plugin or job does not choose one explicitly.
DefaultMessageFormat: BasicMarkdown
TimeOuts:
  Plugin:
    Warn: 7m
    Kill: 14m
  Job:
    Warn: 1h
    Kill: 2h

## The installed engine defaults already enable a useful baseline:
## - built-in admin/help/history/jobcmd/logging/ping/fallback
## - external admin, knock, links, lists, ssh-admin
##
## Uncomment local overrides here only when you want to change that baseline.
# ExternalPlugins:
#   "admin":
#     Disabled: true
#   "knock":
#     Disabled: true
#   "links":
#     Disabled: true
#   "lists":
#     Disabled: true
#   "ssh-admin":
#     Disabled: true

## Optional simple shipped features.
## To use the groups authorizer, set DefaultAuthorizer: groups and then
## copy the installed conf/plugins/groups.yaml into custom/conf/plugins/ and
## customize it for your robot.
# DefaultAuthorizer: groups

## Optional credentialed integrations remain disabled until you enable them.
## Use the conf/*.yaml.sample files from the distribution as the starting point for setup:
## - conf/protocols/slack.yaml.sample
## - conf/plugins/duo.yaml.sample
## - conf/plugins/memes.yaml.sample
## - conf/plugins/openai-fallback.yaml.sample
## - conf/plugins/github-link.yaml.sample
## - conf/plugins/github-tools.yaml.sample
## - conf/jobs/github-review-digest.yaml.sample
## - conf/jobs/go-openai-prune.yaml.sample

## Jobs are scheduled with github.com/robfig/cron; includes seconds.
## Note that pause-notifies is scheduled by default in
## a standard robot.
ScheduledJobs:
- Name: pause-notifies
  Schedule: "0 0 8 * * *"
## If you have a Gemfile or requirements.txt, you can install library
## dependencies with this init job.
# - Name: install-libs
#   Schedule: "@init"
## If using go-openai-fallback, prune stale chat contexts daily.
# - Name: go-openai-prune
#   Schedule: "0 15 3 * * *"
## If you want updatecfg compatibility behavior, schedule it explicitly.
# - Name: updatecfg
#   Schedule: "@init"
## Example with arguments
# - Name: hello
#   Schedule: "@every 30s"
#   Arguments: # an array of strings; up to the job to parse numbers & bools
#   - "Hello, World !!!"
#
# Users the bot should never listen to.
#IgnoreUsers: [ "otherbot", "slackbot" ]
