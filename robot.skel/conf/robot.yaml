# AdminContact: "Joe Admin, <joe@my.org>"

## "BIG HAMMER" security - if IgnoreUnlistedUsers is set, your
## robot will drop all messages from users that don't appear in the
## UserRoster.
IgnoreUnlistedUsers: true

## Improved security for secrets - if SecureParameters is true,
## Jobs, Plugins and Tasks will need to use the GetParameter(secret_name)
## API call to retrieve secrets, instead of getting them from environment
## variables. This may require some jobs to load the library where formerly
## it wasn't needed.
SecureParameters: true

{{ $environment := env "GOPHER_ENVIRONMENT" | default "development" }}
## Environment-specific startup defaults (protocol/brain/log destination).
{{ printf "environments/%s.yaml" $environment | .Include }}

{{ $botname := env "GOPHER_BOTNAME" | default "<botname>" }}
{{ $botemail := env "GOPHER_BOTEMAIL" | default "<botemail>" }}
{{ $botfullname := env "GOPHER_BOTFULLNAME" | default "<botfullname>" }}
{{ $botalias := env "GOPHER_ALIAS" | default "<botalias>" }}

BotInfo:
  UserName: {{ $botname }}
  Email: {{ $botemail }}
  FullName: {{ $botfullname }}
  FirstName: {{ $botname }}
  LastName: Gopherbot

Alias: '{{ $botalias }}'

# Defaults for history and workspace directories, relative to the
# process working directory.
{{ $workdir := env "GOPHER_WORKSPACE" | default "workspace" }}
{{ if $workdir -}} WorkSpace: {{ $workdir }} {{- end }}

## Configure a history provider
{{ $history := env "GOPHER_HISTORY_PROVIDER" | default "file" }}
HistoryProvider: {{ $history }}

## If the plugin doesn't specify an outgoing message format, what's the default?
## BasicMarkdown is the v3 default portable format. 'Raw' is unmodified,
## subject to protocol-specific formatting. 'Variable' will escape special
## characters like #, @, _, `, etc. so those characters can appear in replies.
## 'Fixed' will send everything in a fixed-width font.
# DefaultMessageFormat: Raw # BasicMarkdown if not specified

ExternalJobs:
#   "sample-job":
#     Description: Example scheduled job for testing
#     Path: jobs/your-job.sh
#     Privileged: true
#   "github-review-digest":
#     Description: Example JavaScript job that DMs a user a GitHub review digest
#     Path: jobs/samples/github-review-digest.js
#   "go-openai-prune":
#     Description: Prune stale go-openai-fallback conversation datums
#     Path: jobs/go-openai-prune/go_openai_prune_job.go
#     Homed: true
#     Parameters:
#     - Name: NONCE
#       Value: "No way, Jack!"

## Jobs are scheduled with github.com/robfig/cron; includes seconds.
## Note that pause-notifies is scheduled by default in
## a standard robot.
ScheduledJobs:
- Name: pause-notifies
  Schedule: "0 0 8 * * *"
## If you have a Gemfile or requirements.txt, you can install library
## dependencies with this init job.
# - Name: install-libs
#   Schedule: "@init"
## If your robot is logging to a file, this job will rotate logs
# - Name: logrotate
#   Schedule: "5 0 0 * * *"
## If using go-openai-fallback, prune stale chat contexts daily.
# - Name: go-openai-prune
#   Schedule: "0 15 3 * * *"
## Example with arguments
# - Name: hello
#   Schedule: "@every 30s"
#   Arguments: # an array of strings; up to the job to parse numbers & bools
#   - "Hello, World !!!"

