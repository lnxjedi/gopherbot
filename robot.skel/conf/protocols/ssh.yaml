## protocols/ssh.yaml - sample configuration for the SSH connector
## Add your authorized users and keys in ProtocolConfig.UserKeys.
ProtocolConfig:
  ListenHost: {{ env "GOPHER_SSH_HOST" | default "localhost" }}
  ListenPort: {{ env "GOPHER_SSH_PORT" | default "4221" }}
  DefaultChannel: general
  BotName: '<botname>'
  HostKey: {{ decrypt "<sshhostkeyencrypted>" }}
  Color: true
  ColorScheme:
    prompt: 39
    timestamp: 244
    bot: 81
    user: 114
    system: 220
    info: 45
    warning: 214
    error: 196
    private: 129
    inlinecode: 210
    codeblock: 48
  UserKeys: []
  # - UserName: johndoe
  #   PublicKeys:
  #   - "ssh-ed25519 AAAA...firstkey"
  #   - "ssh-ed25519 AAAA...secondkey"
