## Active local SSH connector configuration for a new robot.
## The onboarding flow writes the host key and your initial authorized key here.
ProtocolConfig:
  ListenHost: {{ env "GOPHER_SSH_HOST" | default "localhost" }}
  ListenPort: {{ env "GOPHER_SSH_PORT" | default "4221" }}
  DefaultChannel: general
  HostKey: {{ decrypt "<sshhostkeyencrypted>" }}
  Color: true
  ColorScheme:
    prompt: 39
    timestamp: 244
    bot: 81
    user: 114
    system: 220
    info: 45
    warning: 214
    error: 196
    private: 129
    inlinecode: 210
    codeblock: 48
  UserKeys: []
  # - UserName: johndoe
  #   PublicKeys:
  #   - "ssh-ed25519 AAAA...firstkey"
  #   - "ssh-ed25519 AAAA...secondkey"
