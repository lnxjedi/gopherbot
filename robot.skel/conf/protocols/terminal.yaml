## Optional local terminal connector settings.
## New robots do not start with the terminal connector enabled by default, but
## this file is kept as a convenient starting point for local development.
## See the installed `conf/protocols/terminal.yaml` for a fuller example.
## Bot identity comes from BotInfo in conf/robot.yaml; do not set BotName in
## ProtocolConfig.
ProtocolConfig:
  EOF: '<botalias>quit'
  Abort: '<botalias>abort'
  HearSelf: false # set true for the robot to hear it's own messages
AppendUserRoster:
- UserName: '<botname>'
  BotUser: true
## Terminal connector user IDs are connector-local via ProtocolConfig.Users
## in terminal.yaml; do not use UserMap keys in v3 config.
