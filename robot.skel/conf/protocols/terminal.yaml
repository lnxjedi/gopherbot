## The terminal connector can mirror the actual team/users/channels for
## devel. See the installed `conf/protocols/terminal.yaml`
## (normally in /opt/gopherbot/conf/protocols/terminal.yaml) for a full example.
## Bot identity comes from BotInfo in conf/robot.yaml; do not set BotName in
## ProtocolConfig.
ProtocolConfig:
  EOF: '<botalias>quit'
  Abort: '<botalias>abort'
  HearSelf: false # set true for the robot to hear it's own messages
AppendUserRoster:
- UserName: '<botname>'
  BotUser: true
## Terminal connector user IDs are connector-local via ProtocolConfig.Users
## in terminal.yaml; do not use UserMap keys in v3 config.
