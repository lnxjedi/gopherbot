## ssh.yaml - stock configuration for the SSH connector
{{ $botname := env "GOPHER_BOTNAME" | default "floyd" }}
{{ $botfullname := env "GOPHER_BOTFULLNAME" | default "Floyd Gopherbot"}}
{{ $botalias := env "GOPHER_ALIAS" | default ";"}}

AdminUsers: [ "alice" ]
DefaultChannels: [ "general", "random" ]

BotInfo:
  UserName: {{ $botname }}
  FullName: {{ $botfullname }}

Alias: {{ $botalias }}

ProtocolConfig:
  ListenHost: {{ env "GOPHER_SSH_HOST" | default "localhost" }}
  ListenPort: {{ env "GOPHER_SSH_PORT" | default "4221" }}
  HearSelf: true
  DefaultChannel: general
  BotName: {{ $botname }}
  Color: true
  ColorScheme:
    prompt: 39
    timestamp: 244
    bot: 81
    user: 114
    system: 220
    info: 45
    warning: 214
    error: 196
    private: 129
  Channels:
  - random
  - general
  - deadzone
  UserKeys:
  - UserName: alice
    PublicKeys:
    - "ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIM/4Ld4ZWcUBhlRCoSm7EmGTyYAQZ/JJoI+zBzeGx7Yr"
  - UserName: bob
    PublicKeys:
    - "ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIH4HG8pJKWu/X3bWmeE+/kiv+bFz59iPlviGblL575bG"
  - UserName: carol
    PublicKeys:
    - "ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIHRB9wUy9A1Xh7fGUw+DkFHe4OTlyTtL+Gs0tpLgKPJn"
  - UserName: david
    PublicKeys:
    - "ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIGK46mlcwaujg5h2gVYYmPpMcKbN8i9HtWO728xkbYTa"
  - UserName: erin
    PublicKeys:
    - "ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIO9Ql2OpNDensa9uEaKC2iz/HUNyeuVZxfykeVuAwjLX"

{{ $defaultjobchannel := "general" }}
DefaultJobChannel: {{ env "GOPHER_JOBCHANNEL" | default $defaultjobchannel }}
