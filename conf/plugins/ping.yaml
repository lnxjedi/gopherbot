---
# These are used to see if the robot is alive, so should answer in every channel
AllChannels: true
AllowedHiddenCommands:
- ping
- whoami
Commands:
- Command: "ping"
  # Regex: "(?i:ping)"
  SimpleMatcher: "ping"
  Keywords: [ "ping" ]
  Usage: "ping"
  Summary: "see if the bot is alive"
  Examples:
  - "(alias) ping"
- Command: "ignore"
  # NOTE: We don't match 'I <something>' - otherwise users couldn't say
  # "Floyd, I love you" (or "Floyd, I think you're a nimrod")
  # Regex: '(?s:(?:i(?:gnore)?|Ignore|I:)[ :].*)'
  SimpleMatcher: "/i:|ignore|ignore:/ <message:rest>"
  Keywords: [ "ignore" ]
  Usage: "i(gnore): <anything>"
  Summary: "ignore a chat message, useful for subscribed threads or in channels that match all messages"
  Examples:
  - "(alias) ignore: this is a test"
- Command: "thanks"
  Regex: "(?i:thanks?( you)?!?)"
- Command: "rules"
  # Regex: '(?i:(?:what are )?the rules\??)'
  SimpleMatcher: "{what are} the rules?"
  Keywords: [ "rules" ]
  Usage: "what are the rules?"
  Summary: "Be sure the robot knows how to conduct his/herself."
  Examples:
  - "(bot), what are the rules?"
- Command: "thread"
  # Regex: "(?:(?i:(?:(?:new|start|create)[ -])?thread)(?: .*)?)"
  SimpleMatcher: "{new|start|create} thread [<topic:rest>]"
  Keywords: [ "thread" ]
  Usage: "new thread (topic)"
  Summary: "start a new thread with the robot; informational topic optional"
  Examples:
  - "(alias) new thread"
  - "(alias) thread db-migration"
- Command: "whoami"
  # Regex: "(?i:whoami)"
  SimpleMatcher: "whoami"
  Keywords: [ "whoami", "user", "identity", "handle", "username" ]
  Usage: "whoami"
  Summary: "Get the robot to tell you a little bit about yourself."
  Examples:
  - "(bot), whoami"
- Command: "hello"
  Regex: "(?i:(?:hi|hello|howdy)[.!]?)"
# These can be supplemented by adding a Config: section to conf/plugins/ping.yaml
Config:
  Welcome:
  - "You're welcome!"
  - "Don't mention it"
  - "De nada"
  - "Sure thing"
  - "No problem!"
  - "No problemo!"
  - "Happy to help"
  - "T'was nothing"
  Thread:
  - "Here you go, a shiny new thread!"
  - "Cool! Let's get some work done, eh?"
  - "Alrighty, let's keep this junk out of the main channel"
  - "That's very kind of you - keeping your silly cruft tucked away in a thread like this"
