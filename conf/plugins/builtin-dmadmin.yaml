---
# builtin-dmadmin plugin configuration - commands only available to bot
# admins via DM
DirectOnly: true
RequireAdmin: true
Commands:
- Command: "listplugins"
  Regex: '(?i:list(?:[- ](disabled))?[- ]plugins?)'
  Keywords: [ "list", "plugin", "plugins" ]
  Usage: "(alias) list (disabled) plugins"
  Summary: "list all known plugins, or list disabled plugins with the reason disabled"
  Examples:
  - "(alias) list plugins"
  - "(alias) list disabled plugins"
  Helptext: [ "(alias) list (disabled) plugins - list all known plugins, or list disabled plugins with the reason disabled" ]
- Command: "dumpplugdefault"
  Regex: '(?i:dump[- ]plugin[- ]default ([\d\w-.]+))'
  Keywords: [ "dump", "plugin" ]
  Usage: "(alias) dump plugin (default) <plugname>"
  Summary: "dump the current or default configuration for the plugin"
  Examples:
  - "(alias) dump plugin default ping"
  Helptext: [ "(alias) dump plugin (default) <plugname> - dump the current or default configuration for the plugin" ]
- Command: "dumpplugin"
  Regex: '(?i:dump[- ]plugin ([\d\w-.]+))'
  Keywords: [ "dump", "plugin" ]
  Usage: "(alias) dump plugin (default) <plugname>"
  Summary: "dump the current or default configuration for the plugin"
  Examples:
  - "(alias) dump plugin ping"
  Helptext: [ "(alias) dump plugin (default) <plugname> - dump the current or default configuration for the plugin" ]
- Command: "dumprobot"
  Regex: "(?i:dump[- ]robot)"
  Keywords: [ "dump", "robot" ]
  Usage: "(alias) dump robot"
  Summary: "dump the current configuration for the robot"
  Examples:
  - "(alias) dump robot"
  Helptext: [ "(alias) dump robot - dump the current configuration for the robot" ]
