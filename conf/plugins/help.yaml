---
Commands:
- Command: help
  # Regex: '(?i:help with (?:help|robot))'
  SimpleMatcher: "help with (help|robot)"
  Keywords: [ "*", "help" ]
  Usage: "help with robot"
  Summary: "give general help on the help system and using the robot"
  Examples:
  - "(alias) help with robot"
MessageMatchers:
- Command: help
  Regex: '^(?i:help)$'
- Command: help
  Regex: '^(?i:help with (?:help|robot))$'
# Help is one of the few plugins where ambient messages (not directed at the
# robot) should match for unlisted users.
MatchUnlisted: true
AllChannels: true
