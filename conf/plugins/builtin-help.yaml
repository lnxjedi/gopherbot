---
AllChannels: true
Commands:
- Command: help
  Regex: '(?i:help(?:\s+(.+))?)'
  Keywords: [ "*", "help" ]
  Usage: "help <keyword>"
  Summary: "find help for commands matching <keyword>"
  Examples:
  - "(alias) help ping"
  - "(alias) help"
  Helptext:
  - "(alias) help <keyword> - find help for commands matching <keyword>"
  - "(alias) help - quick help and discovery pointers"
- Command: commands
  Regex: '(?i:commands?)'
  Keywords: [ "help", "commands", "list", "browse" ]
  Usage: "commands"
  Summary: "browse command groups available in this channel"
  Examples:
  - "(alias) commands"
  Helptext:
  - "(alias) commands - browse command groups available in this channel"
- Command: help-all
  Regex: '(?i:help-all)'
  Keywords: [ "help", "all" ]
  Usage: "help-all"
  Summary: "help for all commands available in this channel, including global commands"
  Examples:
  - "(alias) help-all"
- Command: info
  Regex: '(?i:info|tell me about yourself|about|information)'
  Keywords: [ "info", "information", "robot", "admin", "administrators" ]
  Usage: "info | tell me about yourself"
  Summary: "provide useful information for admins, or a list of admins"
  Examples:
  - "(alias) info"
  - "(alias) tell me about yourself"
  Helptext: [ "(alias) info | tell me about yourself - provide useful information for admins, or a list of admins" ]
AllowedHiddenCommands:
- help
- commands
- help-all
- info
