---
AllChannels: true
AllowDirect: false
Commands:
- Command: jobs
  Regex: '(?i:list (all )?jobs)'
  Keywords: [ "jobs", "list", "job" ]
  Usage: "list-jobs (all)"
  Summary: "list the jobs you have access to, optionally in all channels"
  Examples:
  - "(alias) list-jobs"
  - "(alias) list-jobs --all"
  Helptext: [ "(alias) list-jobs (all) - list the jobs you have access to, optionally in all channels" ]
- Command: jobs
  Regex: '(?i:list[- ]jobs( -?-?all)?)'
  Keywords: [ "job", "jobs", "run" ]
  Usage: "run-job <name> (args...)"
  Summary: "manually start a job run"
  Examples:
  - "(alias) run-job go-update"
  Helptext: [ "(alias) run-job <name> (args...) - manually start a job run" ]
