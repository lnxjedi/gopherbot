---
# For authorizing users by group
Commands:
- Command: 'help'
  # Regex: '(?i:help with groups?)'
  SimpleMatcher: "help with (group|groups)"
  Keywords: [ "group", "groups" ]
  Usage: "help with groups"
  Summary: "give general help for using groups"
  Examples:
  - "(alias) help with groups"
- Command: 'add'
  # Regex: '(?i:add ([\w-.:]+) to (?:the )?(?:([~\w-'' ]+) )?group)'
  SimpleMatcher: "add <user:token> to [the] [<group:rest>] group"
  Contexts: [ "user", "group" ]
  Keywords: [ "group", "groups", "add" ]
  Usage: "add <user> to the <groupname> group"
  Summary: "add a user to a group"
  Examples:
  - "(alias) add alice to the Helpdesk group"
- Command: 'list'
  # Regex: '(?i:list groups)'
  SimpleMatcher: "list groups"
  Keywords: [ "list", "group", "groups" ]
  Usage: "list groups"
  Summary: "give a list of all the groups the robot knows about (bot administrators only)"
  Examples:
  - "(alias) list groups"
- Command: 'remove'
  # Regex: '(?i:(?:remove|delete) ([\w-.:]+) from (?:the )?(?:([~\w-'' ]+) )?group)'
  SimpleMatcher: "(remove|delete) <user:token> from [the] [<group:rest>] group"
  Contexts: [ "user", "group" ]
  Keywords: [ "group", "groups", "remove" ]
  Usage: "remove <user> from the <groupname> group"
  Summary: "remove a dynamic user from a group"
  Examples:
  - "(alias) remove alice from the Helpdesk group"
- Command: 'empty'
  # Regex: '(?i:(?:empty|clear) (?:the )?(?:([~\w-'' ]+) )?group)'
  SimpleMatcher: "(empty|clear) [the] [<group:rest>] group"
  Contexts: [ "group" ]
  Keywords: [ "group", "groups", "empty" ]
  Usage: "empty the <groupname> group"
  Summary: "remove all dynamic users from a group"
  Examples:
  - "(alias) empty the Helpdesk group"
- Command: 'show'
  # Regex: '(?i:show (?:the )?(?:([~\w-'' ]+) )?group)'
  SimpleMatcher: "show [the] [<group:rest>] group"
  Contexts: [ "group" ]
  Keywords: [ "group", "groups", "show", "view" ]
  Usage: "show the <groupname> group"
  Summary: "show the members of a group"
  Examples:
  - "(alias) show the Helpdesk group"
Disabled: true
## The groups authorizer plugin is disabled by default; you can use the example
## config below to configure your own robot.
##
## Generally no real point in configuring both administrators and users;
## administrators can add and remove users dynamically. If a user is listed here
## or stored in memory, they get access.
#
# Config:
#   Groups:
#     Helpdesk:
#       Administrators:
#       - carol
#       Users:
#       - bob
#     SysAdmins:
#       Users:
#       - david
#     NetAdmins:
#       Administrators:
#       - erin
#     Peons:
#       Administrators:
#       - carol
