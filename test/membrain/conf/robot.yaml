AdminContact: "David Parsley, <parsley@linuxjedi.org>"
DefaultChannels: [ "general", "random" ]
DefaultJobChannel: general
JoinChannels: [ ]
AdminUsers: [ "alice" ]
Alias: ";"
LogLevel: debug
PrimaryProtocol: {{ env "GOPHER_PROTOCOL" | default "test" }}

{{ $botname := env "GOPHER_BOTNAME" | default "bender" }}
{{ $botfullname := env "GOPHER_BOTFULLNAME" | default "Bender Rodriguez" }}

BotInfo:
  UserName: {{ $botname }}
  FullName: {{ $botfullname }}
UserRoster:
- UserName: "alice"
  UserID: "u0001"
- UserName: "bob"
  UserID: "u0002"
- UserName: "carol"
  UserID: "u0003"
- UserName: "david"
  UserID: "u0004"
- UserName: "erin"
  UserID: "u0005"

LocalPort: 0
ExternalPlugins:
  "bashdemo":
