AdminContact: "Joe User, <user@example.org>"
DefaultChannels: [ "general", "random" ]
DefaultJobChannel: general
JoinChannels: [ ]
AdminUsers: [ "alice" ]
Alias: ";"
PrimaryProtocol: {{ env "GOPHER_PROTOCOL" | default "test" }}

{{ $botname := env "GOPHER_BOTNAME" | default "bender" }}
{{ $botfullname := env "GOPHER_BOTFULLNAME" | default "Bender Rodriguez" }}

BotInfo:
  UserName: {{ $botname }}
  FullName: {{ $botfullname }}
UserRoster:
- UserName: "alice"
  UserID: "u0001"
- UserName: "bob"
  UserID: "u0002"
- UserName: "carol"
  UserID: "u0003"
- UserName: "david"
  UserID: "u0004"
- UserName: "erin"
  UserID: "u0005"

LocalPort: 0
ExternalPlugins:
  "gofull":
    Path: plugins/test/gofull.go
    ParameterSets:
    - github_oauth
  "gosec":
    Path: plugins/test/gofull.go
  "gosec-authall":
    Path: plugins/test/gofull.go
  "gosec-adminonly":
    Path: plugins/test/gofull.go
  "gosec-users":
    Path: plugins/test/gofull.go
ExternalTasks:
  "param-show":
    Path: test/tasks/param_show.sh
  "pipeline-note":
    Path: test/tasks/pipeline_note.sh
ExternalJobs:
  "pipe-job":
    Path: test/tasks/pipeline_note.sh
    Privileged: false
  "pipe-spawn-job":
    Path: test/tasks/pipeline_note.sh
    Privileged: false

WorkSpace: workspace

Brain: mem
DefaultAuthorizer: groups
DefaultElevator: builtin-totp
ParameterSets:
  github_oauth:
    Parameters:
    - Name: CLIENT_ID
      Value: "gofull-client"
    - Name: CLIENT_SECRET
      Value: "gofull-secret"
IdentityProviders:
  github:
    Type: oauth2
    CredentialParameterSet: github_oauth
    OAuth2: {}
