sandbox_mode = "workspace-write"

[sandbox_workspace_write]
writable_roots = [
  ".",
  "../../gopherbot-doc",
  "../../clu/custom",
  "../../floyd/custom",
  "../../bishop",
]

[mcp_servers.gopherbot-mcp]
command = "gopherbot-mcp"

[mcp_servers.gopherbot-mcp.tools.robot_status]
