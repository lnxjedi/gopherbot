[mcp_servers.gopherbot-mcp.tools.restart_robot]
approval_mode = "approve"

[mcp_servers.gopherbot-mcp.tools.get_messages]
approval_mode = "approve"

[mcp_servers.gopherbot-mcp.tools.send_message]
approval_mode = "approve"

[mcp_servers.gopherbot-mcp.tools.tail_robot_log]
approval_mode = "approve"

[mcp_servers.gopherbot-mcp.tools.stop_robot]
approval_mode = "approve"

[mcp_servers.gopherbot-mcp.tools.start_robot]
approval_mode = "approve"

[mcp_servers.gopherbot-mcp.tools.read_robot_log]
approval_mode = "approve"

[mcp_servers.gopherbot-mcp.tools.list_integration_suites]
approval_mode = "approve"

[mcp_servers.gopherbot-mcp.tools.run_integration_suite]
approval_mode = "approve"

[mcp_servers.gopherbot-mcp.tools.read_integration_result]
