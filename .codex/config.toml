sandbox_mode = "workspace-write"

[sandbox_workspace_write]
writable_roots = [
  ".",
  "../../gopherbot-doc",
  "../../clu/custom",
]

[mcp_servers.gopherbot-mcp]
command = "gopherbot-mcp"
default_tools_approval_mode = "approve"

[mcp_servers.gopherbot-mcp.tools.robot_status]
approval_mode = "approve"

[mcp_servers.gopherbot-mcp.tools.restart_robot]
approval_mode = "approve"

[mcp_servers.gopherbot-mcp.tools.get_messages]
approval_mode = "approve"

[mcp_servers.gopherbot-mcp.tools.send_message]
approval_mode = "approve"

[mcp_servers.gopherbot-mcp.tools.tail_robot_log]
approval_mode = "approve"
