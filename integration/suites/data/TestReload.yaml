name: TestReload
metadata:
  subsystems:
    - admin
    - config
    - scheduler
  tags:
    - reload
  runtimes:
    - go
  tier: smoke
config_dir: test/membrain
log_name: bottest.log
cases:
  - input:
      user: alice
      channel: general
      text: reload, bender
    replies:
      - channel: general
        text_pattern: Starting init job 'go-bootstrap'.*
    events:
      - AdminCheckPassed
      - CommandTaskRan
      - GoPluginRan
      - ScheduledTaskRan
