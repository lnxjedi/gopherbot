name: TestBuiltinAdminSecretTools
metadata:
  subsystems:
    - admin
    - hidden-commands
    - secrets
  tags:
    - builtin-admin
    - encrypt-secret
    - uuid
  runtimes:
    - go
  tier: focused
config_dir: test/membrain
log_name: bottest-admin-secret-tools.log
flow:
  - name: encrypt-secret-public-denied
    case:
      input:
        user: alice
        channel: general
        text: ;encrypt-secret hunter2
      replies:
        - channel: general
          text_pattern: This command is only available in a private context.
      events:
        - AdminCheckPassed
  - name: encrypt-secret-hidden
    wait_for_idle: true
    drain_events: true
    send:
      user: alice
      channel: general
      text: 'bender: encrypt-secret hunter2'
      hidden: true
    receive:
      channel: general
      text_pattern: '^\(?[A-Za-z0-9+/=]+\)?$'
      contains_none:
        - hunter2
    expect_events:
      - AdminCheckPassed
      - CommandTaskRan
      - GoPluginRan
  - name: generate-uuid-hidden
    wait_for_idle: true
    drain_events: true
    send:
      user: alice
      channel: general
      text: 'bender: generate-uuid'
      hidden: true
    receive:
      channel: general
      text_pattern: '(?s:^\(?UUID: [0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}\nEncrypted: [A-Za-z0-9+/=]+\)?$)'
    expect_events:
      - AdminCheckPassed
      - CommandTaskRan
      - GoPluginRan
