name: TestShFullEncryptSecret
metadata:
  subsystems:
    - extension-api
    - secrets
    - security
  tags:
    - encrypt-secret
  runtimes:
    - sh
  tier: focused
config_dir: test/shfull
log_name: bottest.log
full_gate: sh
cases:
  - input:
      user: alice
      channel: general
      text: ;sh-encrypt-secret
    replies:
      - channel: general
        text_pattern: 'ENCRYPT SECRET: ok'
    replies_only: true
