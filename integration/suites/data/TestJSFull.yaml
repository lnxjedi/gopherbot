name: TestJSFull
config_dir: test/jsfull
log_name: bottest.log
full_gate: js
before_start: test_http_server
cases:
  - input:
      user: alice
      channel: general
      text: ;say everything
    replies:
      - channel: general
        text_pattern: Regular Say
      - channel: general
        text_pattern: SayThread, yeah
        threaded: true
      - user: alice
        channel: general
        text_pattern: Regular Reply
      - user: alice
        channel: general
        text_pattern: Reply in thread, yo
        threaded: true
      - channel: general
        text_pattern: 'Sending to the channel: general'
      - user: alice
        text_pattern: 'Sending this message to user: alice'
      - user: alice
        channel: general
        text_pattern: 'Sending to user ''alice'' in channel: general'
      - channel: general
        text_pattern: 'Sending to channel ''general'' in thread: 0xDEADBEEF'
        threaded: true
      - user: alice
        channel: general
        text_pattern: 'Sending to user ''alice'' in channel ''general'' in thread: 0xDEADBEEF'
        threaded: true
    events:
      - CommandTaskRan
      - ExternalTaskRan
  - input:
      user: alice
      channel: general
      text: /bender say everything
    replies:
      - channel: general
        text_pattern: (Regular Say)
      - channel: general
        text_pattern: (SayThread, yeah)
        threaded: true
      - user: alice
        channel: general
        text_pattern: (Regular Reply)
      - user: alice
        channel: general
        text_pattern: (Reply in thread, yo)
        threaded: true
      - channel: general
        text_pattern: '(Sending to the channel: general)'
      - user: alice
        text_pattern: '(Sending this message to user: alice)'
      - user: alice
        channel: general
        text_pattern: '(Sending to user ''alice'' in channel: general)'
      - channel: general
        text_pattern: '(Sending to channel ''general'' in thread: 0xDEADBEEF)'
        threaded: true
      - user: alice
        channel: general
        text_pattern: '(Sending to user ''alice'' in channel ''general'' in thread: 0xDEADBEEF)'
        threaded: true
    events:
      - CommandTaskRan
      - ExternalTaskRan
  - input:
      user: alice
      channel: general
      text: ;js-config
    replies:
      - channel: general
        text_pattern: Not completely random.*
    events:
      - CommandTaskRan
      - ExternalTaskRan
  - input:
      user: alice
      channel: general
      text: ;js-http
    replies:
      - channel: general
        text_pattern: 'HTTP GET ok: GET'
      - channel: general
        text_pattern: 'HTTP POST ok: alpha'
      - channel: general
        text_pattern: 'HTTP PUT ok: bravo'
      - channel: general
        text_pattern: 'HTTP ERROR ok: 500'
      - channel: general
        text_pattern: HTTP TIMEOUT ok
    events:
      - CommandTaskRan
      - ExternalTaskRan
  - input:
      user: alice
      channel: general
      text: ;js-subscribe
    replies:
      - channel: general
        text_pattern: 'SUBSCRIBE FLOW: true/true'
    events:
      - CommandTaskRan
      - ExternalTaskRan
  - input:
      user: alice
      channel: general
      text: ;js-prompts
    replies:
      - user: alice
        channel: general
        text_pattern: 'Codename check: pick a mission codename\.'
    events:
      - CommandTaskRan
      - ExternalTaskRan
    pause: 150ms
  - input:
      user: alice
      channel: general
      text: Nova Sparrow
    replies:
      - user: alice
        channel: general
        text_pattern: 'Thread check: pick a favorite snack for launch\.'
        threaded: true
    pause: 150ms
  - input:
      user: alice
      channel: general
      text: spicy popcorn
      threaded: true
    replies:
      - user: alice
        text_pattern: 'DM check: name a secret moon base\.'
    pause: 150ms
  - input:
      user: alice
      text: io station nine
    replies:
      - user: alice
        channel: general
        text_pattern: 'Channel check: describe launch weather in two words\.'
    events:
      - BotDirectMessage
    pause: 150ms
  - input:
      user: alice
      channel: general
      text: aurora clear
    replies:
      - user: alice
        channel: general
        text_pattern: 'Thread rally: choose a backup call sign\.'
        threaded: true
    pause: 150ms
  - input:
      user: alice
      channel: general
      text: ember fox
      threaded: true
    replies:
      - channel: general
        text_pattern: 'PROMPT FLOW OK: Nova Sparrow \| spicy popcorn \| io station nine \| aurora clear \| ember fox'
  - input:
      user: alice
      channel: general
      text: ;js-memory-seed
    replies:
      - channel: general
        text_pattern: 'MEMORY SEED: done'
    events:
      - CommandTaskRan
      - ExternalTaskRan
  - input:
      user: alice
      channel: general
      text: ;js-memory-check
    replies:
      - channel: general
        text_pattern: 'MEMORY CHECK: local=saffron noodles shared=solar soup ctx=orbital-7 thread=<empty> threadctx=<empty>'
    events:
      - CommandTaskRan
      - ExternalTaskRan
  - input:
      user: bob
      channel: general
      text: ;js-memory-check
    replies:
      - channel: general
        text_pattern: 'MEMORY CHECK: local=<empty> shared=solar soup ctx=<empty> thread=<empty> threadctx=<empty>'
    events:
      - CommandTaskRan
      - ExternalTaskRan
  - input:
      user: alice
      channel: general
      text: ;js-memory-thread-check
      threaded: true
    replies:
      - channel: general
        text_pattern: 'MEMORY THREAD CHECK: local=<empty> shared=<empty> ctx=<empty> thread=delta thread threadctx=aurora mission'
        threaded: true
    events:
      - CommandTaskRan
      - ExternalTaskRan
  - input:
      user: alice
      channel: general
      text: ;js-memory-delete
    replies:
      - channel: general
        text_pattern: 'MEMORY DELETE: done'
    events:
      - CommandTaskRan
      - ExternalTaskRan
  - input:
      user: alice
      channel: general
      text: ;js-memory-check
    replies:
      - channel: general
        text_pattern: 'MEMORY CHECK: local=<empty> shared=<empty> ctx=<empty> thread=<empty> threadctx=<empty>'
    events:
      - CommandTaskRan
      - ExternalTaskRan
  - input:
      user: bob
      channel: general
      text: ;js-memory-check
    replies:
      - channel: general
        text_pattern: 'MEMORY CHECK: local=<empty> shared=<empty> ctx=<empty> thread=<empty> threadctx=<empty>'
    events:
      - CommandTaskRan
      - ExternalTaskRan
  - input:
      user: alice
      channel: general
      text: ;js-memory-thread-delete
      threaded: true
    replies:
      - channel: general
        text_pattern: 'MEMORY THREAD DELETE: done'
        threaded: true
    events:
      - CommandTaskRan
      - ExternalTaskRan
  - input:
      user: alice
      channel: general
      text: ;js-memory-thread-check
      threaded: true
    replies:
      - channel: general
        text_pattern: 'MEMORY THREAD CHECK: local=<empty> shared=<empty> ctx=<empty> thread=<empty> threadctx=<empty>'
        threaded: true
    events:
      - CommandTaskRan
      - ExternalTaskRan
  - input:
      user: alice
      channel: general
      text: ;js-memory-datum-seed
    replies:
      - channel: general
        text_pattern: 'MEMORY DATUM SEED: update=Ok'
    events:
      - CommandTaskRan
      - ExternalTaskRan
  - input:
      user: alice
      channel: general
      text: ;js-memory-datum-check
    replies:
      - channel: general
        text_pattern: 'MEMORY DATUM CHECK: mission=opal-orbit vehicle=heron-7 status=go'
    events:
      - CommandTaskRan
      - ExternalTaskRan
  - input:
      user: alice
      channel: general
      text: ;js-memory-datum-checkin
    replies:
      - channel: general
        text_pattern: 'MEMORY DATUM CHECKIN: exists=true token=true ret=Ok'
    events:
      - CommandTaskRan
      - ExternalTaskRan
  - input:
      user: alice
      channel: general
      text: ;js-memory-datum-delete
    replies:
      - channel: general
        text_pattern: 'MEMORY DATUM DELETE: ret=Ok'
    events:
      - CommandTaskRan
      - ExternalTaskRan
  - input:
      user: alice
      channel: general
      text: ;js-memory-datum-check
    replies:
      - channel: general
        text_pattern: 'MEMORY DATUM CHECK: mission=<empty> vehicle=<empty> status=<empty>'
    events:
      - CommandTaskRan
      - ExternalTaskRan
  - input:
      user: alice
      channel: general
      text: ;js-identity
    replies:
      - channel: general
        text_pattern: 'IDENTITY CHECK: bot=bender/Ok sender=Alice/Ok bob=Robert/Ok set=true param=<empty>'
    events:
      - CommandTaskRan
      - ExternalTaskRan
  - input:
      user: alice
      channel: general
      text: ;js-parameter-addtask
    replies:
      - channel: general
        text_pattern: 'SETPARAM ADDTASK: queued'
      - channel: general
        text_pattern: 'PARAM-SHOW: PIPELINE_SENTINEL=nebula-42'
    events:
      - CommandTaskRan
      - ExternalTaskRan
      - ExternalTaskRan
  - input:
      user: alice
      channel: general
      text: ;js-oauth2-cycle
    replies:
      - channel: general
        text_pattern: 'IDENTITY FLOW: link=Ok token=js-token get=Ok unlink=Ok'
    events:
      - CommandTaskRan
      - ExternalTaskRan
