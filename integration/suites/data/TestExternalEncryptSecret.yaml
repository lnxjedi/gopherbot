name: TestExternalEncryptSecret
config_dir: test/membrain
log_name: bottest.log
cases:
  - input:
      user: alice
      channel: general
      text: ;python-encrypt-secret
    replies:
      - channel: general
        text_pattern: 'ENCRYPT SECRET: ok'
    replies_only: true
  - input:
      user: alice
      channel: general
      text: ;python-encrypt-secret-unpriv
    replies:
      - channel: general
        text_pattern: 'ENCRYPT SECRET: failed'
    replies_only: true
  - input:
      user: alice
      channel: general
      text: ;ruby-encrypt-secret
    replies:
      - channel: general
        text_pattern: 'ENCRYPT SECRET: ok'
    replies_only: true
  - input:
      user: alice
      channel: general
      text: ;ruby-encrypt-secret-unpriv
    replies:
      - channel: general
        text_pattern: 'ENCRYPT SECRET: failed'
    replies_only: true
