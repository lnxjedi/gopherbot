name: TestBotName
config_dir: test/membrain
log_name: bottest.log
cases:
  - input:
      user: alice
      text: ping, bender
    replies:
      - user: alice
        text_pattern: PONG
    events:
      - BotDirectMessage
      - CommandTaskRan
      - GoPluginRan
  - input:
      user: alice
      text: ;ping
    replies:
      - user: alice
        text_pattern: PONG
    events:
      - BotDirectMessage
      - CommandTaskRan
      - GoPluginRan
  - input:
      user: alice
      text: /ping
    replies:
      - user: alice
        text_pattern: \(Use /bender <command> to address a hidden command\.\)
    events:
      - BotDirectMessage
  - input:
      user: alice
      text: bender ping
    replies:
      - user: alice
        text_pattern: PONG
    events:
      - BotDirectMessage
      - CommandTaskRan
      - GoPluginRan
  - input:
      user: alice
      text: ping
    replies:
      - user: alice
        text_pattern: PONG
    events:
      - BotDirectMessage
      - CommandTaskRan
      - GoPluginRan
  - input:
      user: alice
      channel: general
      text: ping, bender
    replies:
      - user: alice
        channel: general
        text_pattern: PONG
    events:
      - CommandTaskRan
      - GoPluginRan
  - input:
      user: alice
      channel: general
      text: ;ping
    replies:
      - user: alice
        channel: general
        text_pattern: PONG
    events:
      - CommandTaskRan
      - GoPluginRan
  - input:
      user: alice
      channel: general
      text: bender ping
    replies:
      - user: alice
        channel: general
        text_pattern: PONG
    events:
      - CommandTaskRan
      - GoPluginRan
  - input:
      user: alice
      channel: general
      text: bender, ping
    replies:
      - user: alice
        channel: general
        text_pattern: PONG
    events:
      - CommandTaskRan
      - GoPluginRan
  - input:
      user: alice
      channel: general
      text: '@bender ping'
    replies:
      - user: alice
        channel: general
        text_pattern: PONG
    events:
      - CommandTaskRan
      - GoPluginRan
  - input:
      user: alice
      channel: general
      text: ping, @bender
    replies:
      - user: alice
        channel: general
        text_pattern: PONG
    events:
      - CommandTaskRan
      - GoPluginRan
  - input:
      user: alice
      channel: general
      text: ping;
  - input:
      user: bob
      channel: general
      text: 'bender: echo hello world'
    replies:
      - channel: general
        text_pattern: 'Sure thing: hello world'
        threaded: true
    events:
      - CommandTaskRan
      - ExternalTaskRan
  - input:
      user: bob
      channel: general
      text: '/bender: echo hello world'
    replies:
      - channel: general
        text_pattern: '\(Sure thing: hello world\)'
        threaded: true
    events:
      - CommandTaskRan
      - ExternalTaskRan
  - input:
      user: alice
      channel: general
      text: ping
    pause: 300ms
  - input:
      user: alice
      channel: general
      text: bender
    replies:
      - user: alice
        channel: general
        text_pattern: PONG
    events:
      - CommandTaskRan
      - GoPluginRan
  - input:
      user: alice
      channel: general
      text: ping
    pause: 300ms
  - input:
      user: alice
      channel: general
      text: ;
    replies:
      - user: alice
        channel: general
        text_pattern: PONG
    events:
      - CommandTaskRan
      - GoPluginRan
