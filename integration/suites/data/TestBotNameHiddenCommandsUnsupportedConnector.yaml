name: TestBotNameHiddenCommandsUnsupportedConnector
metadata:
  subsystems:
    - connector
    - hidden-commands
    - routing
  tags:
    - capabilities
  tier: focused
config_dir: test/membrain
log_name: bottest.log
capabilities:
  test:
    hidden_commands: false
cases:
  - input:
      user: alice
      text: /ping
    replies:
      - user: alice
        text_pattern: This command isn't supported with test because hidden commands are unavailable for this connector\. Check with the robot administrator\.
    events:
      - BotDirectMessage
