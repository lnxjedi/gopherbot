name: TestGoFullEncryptSecret
metadata:
  subsystems:
    - extension-api
    - secrets
    - security
  tags:
    - encrypt-secret
  runtimes:
    - go
  tier: focused
config_dir: test/gofull
log_name: bottest.log
full_gate: go
cases:
  - input:
      user: alice
      channel: general
      text: ;go-encrypt-secret
    replies:
      - channel: general
        text_pattern: 'ENCRYPT SECRET: ok'
    replies_only: true
  - input:
      user: alice
      channel: general
      text: ;go-encrypt-secret-unpriv
    replies:
      - channel: general
        text_pattern: 'ENCRYPT SECRET: failed'
    replies_only: true
