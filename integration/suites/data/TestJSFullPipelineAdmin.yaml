name: TestJSFullPipelineAdmin
config_dir: test/jsfull
log_name: bottest.log
full_gate: js
cases:
  - input:
      user: alice
      channel: general
      text: ;js-admin-check
    replies:
      - channel: general
        text_pattern: 'ADMIN CHECK: true'
    replies_only: true
  - input:
      user: bob
      channel: general
      text: ;js-admin-check
    replies:
      - channel: general
        text_pattern: 'ADMIN CHECK: false'
    replies_only: true
  - input:
      user: alice
      channel: general
      text: ;js-elevate-check
    replies:
      - user: alice
        channel: general
        text_pattern: This command requires immediate elevation.*TOTP code.*
    replies_only: true
    pause: 150ms
  - input:
      user: alice
      channel: general
      text: "123456"
    replies:
      - channel: general
        text_pattern: There were technical issues validating your code.*
      - channel: general
        text_pattern: Sorry, elevation failed due to a problem with the elevation service
      - channel: general
        text_pattern: 'ELEVATE CHECK: false'
    replies_only: true
  - input:
      user: alice
      channel: general
      text: ;js-pipeline-ok
    replies:
      - channel: general
        text_pattern: 'PIPELINE OK: queued'
      - channel: general
        text_pattern: 'PIPE NOTE: add-task'
      - channel: general
        text_pattern: Starting job 'pipe-job job-step', run [0-9]+
      - channel: general
        text_pattern: 'PIPE NOTE: job-step'
      - channel: general
        text_pattern: 'Finished job ''pipe-job'', run [0-9]+, final task ''pipe-job'', status: normal'
      - channel: general
        text_pattern: 'PIPE ADD COMMAND: ran'
      - channel: general
        text_pattern: 'PIPE FINAL COMMAND: ran'
      - channel: general
        text_pattern: 'PIPE NOTE: final-task'
    replies_only: true
  - input:
      user: alice
      channel: general
      text: ;js-pipeline-fail
    replies:
      - channel: general
        text_pattern: 'PIPELINE FAIL: armed'
      - channel: general
        text_pattern: 'PIPE NOTE: fail-task'
      - channel: general
        text_pattern: 'PIPE FAIL COMMAND: ran'
      - channel: general
        text_pattern: 'Pipeline failure: exit code 1 \(Fail\)'
    replies_only: true
  - input:
      user: alice
      channel: general
      text: ;js-spawn-job
    replies:
      - channel: general
        text_pattern: Starting job 'pipe-spawn-job spawn-step', run [0-9]+ - spawned by pipeline .*
      - channel: general
        text_pattern: 'PIPE NOTE: spawn-step'
      - channel: general
        text_pattern: 'Finished job ''pipe-spawn-job'', run [0-9]+, final task ''pipe-spawn-job'', status: normal'
    replies_only: true
